<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Button</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      min-height: 400px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #000;
    }

    .header p {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      color: #6b7280;
    }

    /* Card */
    .card {
      flex: 1;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 2rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* Order rows */
    .order-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }

    .order-row .label {
      color: #6b7280;
    }

    .order-row .value {
      font-weight: 500;
      color: #000;
    }

    .divider {
      border-top: 1px solid #f3f4f6;
      padding-top: 0.75rem;
      margin-top: 0.75rem;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-row .label {
      font-weight: 500;
      color: #000;
    }

    .total-row .value {
      font-size: 1.125rem;
      font-weight: 600;
      color: #000;
    }

    /* Payment Button */
    .btn-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .pay-btn {
      position: relative;
      overflow: hidden;
      min-width: 220px;
      min-height: 56px;
      padding: 1rem 2rem;
      border: none;
      border-radius: 0.5rem;
      background-color: #000;
      color: #fff;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      transition: background-color 0.4s ease;
    }

    .pay-btn:focus-visible {
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px #000;
    }

    .pay-btn:disabled {
      cursor: not-allowed;
    }

    .pay-btn.success {
      background-color: #16a34a;
      animation: bounce 0.4s ease;
    }

    @keyframes bounce {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* Ripple */
    .ripple {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: scale(0);
      animation: ripple-expand 0.6s ease-out forwards;
      pointer-events: none;
    }

    @keyframes ripple-expand {
      to {
        transform: scale(40);
        opacity: 0;
      }
    }

    /* Button content */
    .btn-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-text {
      animation: fadeInUp 0.2s ease forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Success content */
    .success-content {
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Checkmark SVG animation */
    .checkmark-path {
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      animation: drawCheck 0.4s 0.1s ease-out forwards;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    /* Fade out for state transitions */
    .fade-out {
      animation: fadeOut 0.2s ease forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateY(-10px);
      }
    }

    /* Confetti */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      opacity: 0;
      animation: confetti-fall linear forwards;
    }

    @keyframes confetti-fall {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(0deg) scale(1);
      }
      75% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(100vh) rotate(720deg) scale(0.3);
      }
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: #9ca3af;
    }

    .footer p + p {
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Secure Checkout</h1>
      <p>Complete your purchase securely</p>
    </div>

    <div class="card">
      <div class="order-row">
        <span class="label">Product</span>
        <span class="value">Premium Plan</span>
      </div>
      <div class="order-row">
        <span class="label">Duration</span>
        <span class="value">12 months</span>
      </div>
      <div class="divider">
        <div class="total-row">
          <span class="label">Total</span>
          <span class="value">$99.00</span>
        </div>
      </div>

      <div class="btn-wrapper">
        <button class="pay-btn" id="payBtn" onclick="handlePay(event)">
          <div class="btn-content" id="btnContent">
            <span class="btn-text">Pay Now</span>
          </div>
        </button>
      </div>
    </div>

    <div class="footer">
      <p>Apex National Bank</p>
      <p>&copy; 2025 All rights reserved</p>
    </div>
  </div>

  <script>
    let state = "idle";

    const confettiColors = [
      "#000000", "#333333", "#666666", "#999999",
      "#16a34a", "#22c55e", "#4ade80",
      "#ffffff"
    ];

    function launchConfetti() {
      const container = document.createElement("div");
      container.className = "confetti-container";
      document.body.appendChild(container);

      const count = 60;

      for (let i = 0; i < count; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";

        const color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
        const left = Math.random() * 100;
        const delay = Math.random() * 0.4;
        const duration = 1.5 + Math.random() * 1.5;
        const size = 6 + Math.random() * 8;
        const drift = (Math.random() - 0.5) * 200;

        piece.style.backgroundColor = color;
        piece.style.left = left + "%";
        piece.style.top = "-20px";
        piece.style.width = size + "px";
        piece.style.height = size * 1.6 + "px";
        piece.style.animationDelay = delay + "s";
        piece.style.animationDuration = duration + "s";
        piece.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
        piece.style.setProperty("--drift", drift + "px");
        piece.style.animation = `confetti-fall ${duration}s ${delay}s linear forwards`;

        container.appendChild(piece);
      }

      // Clean up after all confetti has fallen
      setTimeout(() => container.remove(), 3500);
    }

    function handlePay(e) {
      if (state !== "idle") return;

      const btn = document.getElementById("payBtn");
      const content = document.getElementById("btnContent");
      const rect = btn.getBoundingClientRect();

      // Create ripple
      const ripple = document.createElement("span");
      ripple.className = "ripple";
      ripple.style.left = e.clientX - rect.left - 5 + "px";
      ripple.style.top = e.clientY - rect.top - 5 + "px";
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);

      // Transition to processing
      state = "processing";
      btn.disabled = true;

      content.innerHTML = "";
      const spinner = document.createElement("div");
      spinner.className = "spinner";
      content.appendChild(spinner);

      // Simulate payment delay, then show success
      setTimeout(() => {
        state = "success";
        btn.classList.add("success");

        content.innerHTML = "";
        const successWrap = document.createElement("div");
        successWrap.className = "btn-content success-content";
        successWrap.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path class="checkmark-path" d="M5 13l4 4L19 7"
              stroke="white" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span>Payment Successful</span>
        `;
        content.appendChild(successWrap);

        // Launch confetti on success
        launchConfetti();

        // Auto reset after 3 seconds
        setTimeout(() => reset(), 3000);
      }, 1200);
    }

    function reset() {
      const btn = document.getElementById("payBtn");
      const content = document.getElementById("btnContent");

      btn.classList.remove("success");
      btn.disabled = false;
      content.innerHTML = '<span class="btn-text">Pay Now</span>';
      state = "idle";
    }
  </script>
</body>
</html>
